<main class="main-wrapper">
  <section class="portal-card">
    <div class="card-header">
      <h2>Gerador de Login de Acesso</h2>
      <p>Preencha os dados do cliente para provisionar a credencial no sistema.</p>
    </div>

    <form id="loginForm" class="form-portal">
      <div class="form-group">
        <label for="nome">NOME COMPLETO DO CLIENTE</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="nome" placeholder="Ex: João Carlos Silva" required autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label for="cidade">CIDADE DO ACESSO</label>
        <div class="input-icon-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <select id="cidade" required>
            <option value="" disabled selected>Selecione a cidade...</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary">
        <span>GERAR ACESSO</span>
        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
    </form>

    <div id="resultContainer" class="result-card">
      <div class="result-header">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <span>Credencial Gerada com Sucesso</span>
      </div>

      <div class="result-grid">
        <div class="result-field">
          <label>USUÁRIO GERADO</label>
          <div class="copy-box">
            <input type="text" id="usuarioResult" readonly>
            <button type="button" onclick="copiarTexto('usuarioResult', this)">Copiar</button>
          </div>
        </div>

        <div class="result-field">
          <label>SENHA GERADA</label>
          <div class="copy-box">
            <input type="text" id="senhaResult" readonly>
            <button type="button" onclick="copiarTexto('senhaResult', this)">Copiar</button>
          </div>
        </div>
      </div>

      <div class="regenerate-wrapper">
        <button type="button" id="btnVariacaoLogin" class="btn-link-variacao">
          ⚠️ Login já existe? Clique aqui para gerar alternativa
        </button>
      </div>

    </div>
  </section>
</main>
