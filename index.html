<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Login - Ultra Telecom</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <img src="img/logo.png" alt="Ultra Telecom" class="logo">

    <h1>Gerador de Login</h1>

    <div class="campo">
        <label for="nome">Nome do Cliente</label>
        <input
            type="text"
            id="nome"
            placeholder="Digite o nome do cliente">
    </div>

    <div class="campo">
        <label for="cidade">Cidade</label>

        <select id="cidade">
            <option value="">Carregando cidades...</option>
        </select>
    </div>

    <button onclick="gerarLogin()">
        Gerar Login
    </button>

    <div id="resultado">

        <div class="resultado-item">

            <div>
                <h3>Usuário</h3>
                <p id="usuario"></p>
            </div>

            <button onclick="copiar('usuario')">
                Copiar
            </button>

        </div>

        <div class="resultado-item">

            <div>
                <h3>Senha</h3>
                <p id="senha"></p>
            </div>

            <button onclick="copiar('senha')">
                Copiar
            </button>

        </div>

    </div>

</div>

<script src="js/cidades.js"></script>
<script src="js/script.js"></script>

</body>

</html>
