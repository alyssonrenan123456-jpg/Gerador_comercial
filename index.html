<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Login | Ultra Telecom</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="card">
    <header class="card-header">
      <div class="brand">
        <span class="ultra">ULTRA</span>
        <span class="telecom">TELECOM</span>
      </div>
      <div class="app-title">Gerador de Login</div>
    </header>

    <form id="loginForm" class="form">
      <div class="form-group">
        <label for="nome">NOME COMPLETO DO CLIENTE</label>
        <input type="text" id="nome" placeholder="Ex: João Carlos Silva" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="cidade">CIDADE DO ACESSO</label>
        <select id="cidade" required>
          <option value="" disabled selected>Selecione a cidade...</option>
    
          </select>
      </div>

      <button type="submit" class="btn-generate">GERAR ACESSO</button>
    </form>

    <div id="resultContainer" class="result-area">
      <div class="result-box">
        <label>USUÁRIO</label>
        <div class="copy-wrapper">
          <input type="text" id="usuarioResult" readonly>
          <button onclick="copiarTexto('usuarioResult', this)">Copiar</button>
        </div>
      </div>

      <div class="result-box">
        <label>SENHA</label>
        <div class="copy-wrapper">
          <input type="text" id="senhaResult" readonly>
          <button onclick="copiarTexto('senhaResult', this)">Copiar</button>
        </div>
      </div>
    </div>

    <footer class="footer">
      Desenvolvido por <strong>Alysson Cordeiro</strong> 🏃🏻‍♂️‍➡️
    </footer>
  </main>

  <script src="js/cidades.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
