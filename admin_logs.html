<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Auditoria e Logs | Ultra Telecom</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
    body { background: #0a192f; color: #f8fafc; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 24px; color: #60a5fa; }
    .day-group { background: #1e293b; border-radius: 12px; margin-bottom: 16px; border: 1px solid #334155; overflow: hidden; }
    .day-header { padding: 16px 20px; background: #0f172a; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .day-header h3 { font-size: 16px; color: #e2e8f0; }
    .btn-toggle { background: #0052cc; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .logs-list { display: none; padding: 20px; border-top: 1px solid #334155; }
    .logs-list.open { display: block; }
    .log-card { background: #0f172a; padding: 16px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #0052cc; }
    .log-time { font-size: 12px; color: #94a3b8; font-weight: 700; margin-bottom: 6px; }
    .log-user { font-size: 14px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; }
    .log-details { background: #1e293b; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 13px; color: #38bdf8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📅 Registros de Auditoria de Acessos</h1>
    <div id="logsContainer">Carregando logs...</div>
  </div>

  <script>
    async function carregarLogs() {
      try {
        const res = await fetch('/api/admin/logs');
        if (res.status === 403) {
          document.body.innerHTML = '<h2 style="color:red; text-align:center; margin-top:50px;">403 Acesso Negado</h2>';
          return;
        }
        const data = await res.json();
        renderizarLogs(data);
      } catch (err) {
        document.getElementById('logsContainer').innerText = 'Erro ao carregar os logs.';
      }
    }

    function renderizarLogs(logsAgrupados) {
      const container = document.getElementById('logsContainer');
      container.innerHTML = '';

      const datas = Object.keys(logsAgrupados);
      if (datas.length === 0) {
        container.innerHTML = '<p style="color:#94a3b8;">Nenhum registro de log encontrado.</p>';
        return;
      }

      datas.forEach(data => {
        const logsDoDia = logsAgrupados[data];
        const dayBox = document.createElement('div');
        dayBox.className = 'day-group';

        let htmlLogs = logsDoDia.map(log => `
          <div class="log-card">
            <div class="log-time">⏱️ ${log.horario}</div>
            <div class="log-user">Usuário: ${log.atendente}</div>
            <div class="log-details">
              Criou:<br>
              Login: ${log.login_criado}<br>
              Senha: ${log.senha_criada}
            </div>
          </div>
        `).join('');

        dayBox.innerHTML = `
          <div class="day-header" onclick="toggleLogs(this)">
            <h3>📅 ${data} (${logsDoDia.length} acessos)</h3>
            <button class="btn-toggle">Ver logs</button>
          </div>
          <div class="logs-list">${htmlLogs}</div>
        `;

        container.appendChild(dayBox);
      });
    }

    function toggleLogs(header) {
      const list = header.nextElementSibling;
      list.classList.toggle('open');
      const btn = header.querySelector('.btn-toggle');
      btn.innerText = list.classList.contains('open') ? 'Ocultar' : 'Ver logs';
    }

    carregarLogs();
  </script>
</body>
</html>
